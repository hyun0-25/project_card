<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <title>카드 상세 내역조회</title>
    <style>
        .list{
            background-color: rgb(231, 253, 217);
            padding: 10px;
        }
        .modal{
            width: 1000px;
            height: 600px;
            margin: 20px auto;
            padding: 10px;
            box-shadow: 0 0 3px rgba(0, 0, 0, 0.2);
            border-radius: 5px;
        }
        .container{
            display : flex;
            justify-content: space-between;
            padding: 20px;
        }
        select{
            width:170px;
        }
        button{
            margin-left: 5px;
            width: 70px;
        }
        input{
            width: 300px
        }
        label{
            margin-right:10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        thead {
            background-color: rgb(203, 245, 163);
        }
        h2 {
            text-align: center;
            color: #333;
            margin: 30px auto;
        }
    </style>
</head>
<div th:replace="~{fragments/navbar :: globalNavbar}"></div>
<body>
    <h2>카드 상세 내역조회</h2>
    <div class="modal">
        <!-- <form th:action="@{/board/list}" method="get"> -->
        <form id="detailForm">
            <div class="list">
                <div class="container">
                    <div class="form-group">
                        <label>주민번호</label>
                        <input type="hidden" id="ssn" name="ssn">
                        <input type="text" id="ssn1" name="ssn1" style="width: 120px;" maxlength="6"
                            oninput="this.value = this.value.replace(/[^0-9]/g, '');"
                        >
                        -
                        <input type="text" id="ssn2" name="ssn2" style="width: 120px;" maxlength="7"
                            oninput="this.value = this.value.replace(/[^0-9]/g, '');"
                        >
                    </div>
                    <div class="form-group">
                        <label>카드번호</label>
                        <input type="text" id="crdNo" name="crdNo" style="width: 250px;" maxlength="16"
                            oninput="this.value = this.value.replace(/[^0-9]/g, '');"
                        >
                    </div>
                    <div>
                        <button type="button" onclick="checkSsn()">조회</button>
                    </div>
                </div>
            </div>
            <hr>
        </form>
        <div style="padding: 0 10px;">조회 결과</div>
        <div style="height: auto; border: 1px solid #ccc; padding: 10px">
            <div class="container">
                <div class="form-group">
                    <label>성명(한글)</label>
                    <input type="text" id="hgNm" name="hgNm" disabled>
                </div>
                <div class="form-group">
                    <label>성명(영문)</label>
                    <input type="text" id="engNm" name="engNm" disabled>
                </div>
            </div>
            <div class="container">
                <div class="form-group">
                    <label>등록일자</label>
                    <input type="text" id="regD" name="regD" disabled>
                </div>
                <div class="form-group">
                    <label>유효기간</label>
                    <input type="text" id="stlMtd" name="stlMtd" disabled>
                </div>
            </div>
            <div class="container">
                <div class="form-group">
                    <label>브랜드</label>
                    <input type="text" id="stlDd" name="stlDd" disabled>
                </div>
                <div class="form-group">
                    <label>카드 등급</label>
                    <input type="text" id="stmtSndMtd" name="stmtSndMtd" disabled>
                </div>
            </div>
            <div class="container">
                <div class="form-group">
                    <label>전 카드번호</label>
                    <input type="text" id="stlDd" name="stlDd" disabled>
                </div>
                <div class="form-group">
                    <label>고객번호</label>
                    <input type="text" id="stmtSndMtd" name="stmtSndMtd" disabled>
                </div>
            </div>
            <div class="container">
                <div class="form-group">
                    <label>관리 영업점</label>
                    <input type="text" id="stlDd" name="stlDd" disabled>
                </div>
                <div class="form-group">
                    <label>최종 카드여부</label>
                    <input type="text" id="stmtSndMtd" name="stmtSndMtd" disabled>
                </div>
            </div>
            <div class="container">
                <div class="form-group">
                    <label>최종 등록일자</label>
                    <input type="text" id="stlDd" name="stlDd" disabled>
                </div>
            </div>
        </div>
        <div class="container">
            <div style="margin-left: auto;">
                <button type="button" onclick="resetForm()">초기화</button>
            </div>
        </div>
    </div>
</body>
<script>
    function resetForm() {
        document.getElementById('detailForm').reset();
    }
</script>
</html>
